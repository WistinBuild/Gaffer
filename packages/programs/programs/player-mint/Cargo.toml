[package]
name = "player-mint"
version = "0.1.0"
description = "Gaffer individual player NFTs — USDC-priced catalog mint (Solana port of PlayerMint.sol)"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "player_mint"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
anchor-spl = "0.31.1"
