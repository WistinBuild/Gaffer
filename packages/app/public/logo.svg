<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gaffer">
  <defs>
    <radialGradient id="bg" cx="32%" cy="26%" r="90%">
      <stop offset="0%" stop-color="#15301F"/>
      <stop offset="55%" stop-color="#0C1A12"/>
      <stop offset="100%" stop-color="#080B0F"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E192"/>
      <stop offset="48%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9C7C1E"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF87"/>
      <stop offset="100%" stop-color="#00CC6A"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="none" stroke="url(#gold)" stroke-width="8" stroke-opacity="0.85"/>

  <!-- Tactics-board pitch lines (the gaffer's chalkboard) -->
  <g stroke="#00FF87" stroke-opacity="0.16" stroke-width="3" fill="none">
    <line x1="256" y1="64" x2="256" y2="448"/>
    <circle cx="256" cy="256" r="58"/>
    <rect x="86"  y="176" width="58" height="160" rx="4"/>
    <rect x="368" y="176" width="58" height="160" rx="4"/>
  </g>

  <!-- Monogram G -->
  <g filter="url(#soft)">
    <path d="M312 174
             a112 112 0 1 0 0 164
             v-78 h-70 v40 h28 v22
             a70 70 0 1 1 0 -132
             a70 70 0 0 1 50 21
             l30 -30
             a112 112 0 0 0 -68 -7 z"
          fill="url(#gold)"/>
  </g>

  <!-- Electric base bar (the touchline) -->
  <rect x="150" y="372" width="212" height="14" rx="7" fill="url(#grass)"/>
  <circle cx="256" cy="379" r="13" fill="#080B0F" stroke="url(#grass)" stroke-width="6"/>
</svg>
